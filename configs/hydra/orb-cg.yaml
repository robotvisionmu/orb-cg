defaults:
  - _self_

# Root paths
repo_root: ${hydra:runtime.cwd}
data_root: ${repo_root}/data

# Dataset paths
dataset_name: replica  # replica | realsense
dataset_directory_name: Replica
scene_id: room0
dataset_config: ${repo_root}/configs/dataset/${dataset_name}.yaml
dataset_root: ${data_root}/${dataset_directory_name}

# Output path
output_root: ${dataset_root}/${scene_id}/output

# ORB-SLAM paths
slam_vocab_path: ${repo_root}/orbslam/vocab/ORBvoc.txt
slam_settings_path: ${repo_root}/orbslam/sensors/${dataset_name}.yaml

# Model weights
model_paths:
  detection: ${repo_root}/models/detection/yolov8l-world.pt
  segmentation: ${repo_root}/models/segmentation/sam_l.pt

# Object classes
classes_file: ${repo_root}/classes/scannet200_classes.txt
bg_classes: ["wall", "floor", "ceiling"]
skip_bg: !!bool False

# Runtime defaults
start: 0
end: -1
stride: 1
image_height: null
image_width: null
device: cuda
use_rerun: !!bool True
phys_bias: 0.0
match_method: "sim_sum"
sim_threshold: 1.2
mask_area_threshold: 25
mask_conf_threshold: 0.25
max_bbox_area_ratio: 0.5
min_points_threshold: 16
downsample_voxel_size: 0.01
obj_pcd_max_points: 5000
dbscan_remove_noise: !!bool True
dbscan_eps: 0.1
dbscan_min_points: 10

# Hydra output layout
hydra:
  run:
    dir: logs/${now:%Y-%m-%d}/${now:%H-%M-%S}